name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the use case or workflow that's currently missing or painful.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How would this feature work? (CLI flag, output format, etc.)
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What workarounds do you currently use?
