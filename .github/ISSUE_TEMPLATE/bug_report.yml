name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe what you expected vs what actually happened.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Minimal command to trigger the bug.
      placeholder: |
        citracer --pdf paper.pdf --keyword "..." --depth 3
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run with `-v` and paste the relevant output.
      render: shell
  - type: input
    id: version
    attributes:
      label: citracer version
      placeholder: "1.4.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
